<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: background 1.2s ease;
  background: #f2f2f2; /* INICIAL CLARO */
}

/* ESTADO ATIVO (depois do tap) */
body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

.poster {
  position: relative;
  width: 90%;
  max-width: 600px;
  text-align: center;
  z-index: 2;
}

/* TEXTO */
.text {
  transition: all 1s ease;
}

.names {
  font-size: 6vw;
  margin-bottom: 4vh;
  letter-spacing: 6px;
  text-transform: lowercase;
  opacity: 0.6;
}

.date {
  font-size: 12vw;
  font-weight: 300;
}

.info {
  margin-top: 2vh;
  font-size: 3vw;
  letter-spacing: 3px;
  opacity: 0.7;
}

/* TEXTO TEASING */
.tease {
  margin-top: 5vh;
  font-size: 3vw;
  letter-spacing: 3px;
  opacity: 0.7;
  transition: opacity 0.6s ease;
}

/* TEXTO REVEAL */
.reveal {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  font-size: 5vw;
  letter-spacing: 4px;
  opacity: 0;
  transition: opacity 1.2s ease;
}

/* ATIVAR REVEAL */
body.active .tease {
  opacity: 0;
}

body.active .reveal {
  opacity: 1;
}

/* POINTER */
.pointer {
  position: fixed;
  bottom: 70px;
  width: 100%;
  text-align: center;
  z-index: 3;
  animation: bounce 1.2s infinite alternate;
  opacity: 0.8;
}

.pointer img {
  width: 42px;
  filter: brightness(0.2); /* escuro no fundo claro */
  transition: filter 1s ease;
}

/* pointer fica branco depois do tap */
body.active .pointer img {
  filter: brightness(1);
}

/* desaparecer depois do tap */
body.active .pointer {
  opacity: 0;
}

/* bounce suave */
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: opacity 1.5s ease;
}

body.active .bg-video {
  opacity: 0.25;
  filter: blur(6px) contrast(120%) grayscale(100%);
}

/* DESKTOP */
@media (min-width: 600px) {
  .names { font-size: 36px; }
  .date { font-size: 70px; }
  .info, .tease { font-size: 12px; }
}
</style>
</head>

<body>

<div class="poster">
  <div class="text">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>

    <!-- TEASING -->
    <div class="tease">tap to reveal dress code</div>

    <!-- REVEAL -->
    <div class="reveal">
      all black<br>no exceptions
    </div>
  </div>
</div>

<!-- POINTER -->
<div class="pointer">
  <img src="pointer.png">
</div>

<!-- VIDEO -->
<video class="bg-video" loop playsinline preload="auto">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function activateExperience() {
  document.body.classList.add("active");

  const video = document.querySelector(".bg-video");
  const audio = document.getElementById("music");

  video.play().catch(() => {});
  audio.play().catch(() => {});
}

// UM ÚNICO TAP
document.body.addEventListener("click", activateExperience, { once: true });
</script>

</body>
</html>
