<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>

/* RESET */
html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

/* BASE */
body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111;
  transition: all 1s ease;

  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.6), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4), transparent 70%),
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03),
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 2px
    ),
    #efefef;
}

body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

/* LAYOUT */
.poster {
  width: 100%;
  max-width: 600px;
  padding: 40px 20px;
  text-align: center;
  position: relative;
}

/* TEXT RESPONSIVO (FIX PRINCIPAL) */
.names {
  font-size: clamp(20px, 4vw, 32px);
  margin-bottom: 30px;
  letter-spacing: 6px;
  opacity: 0.6;
}

.date {
  font-size: clamp(42px, 10vw, 80px);
}

.info {
  margin-top: 10px;
  font-size: clamp(12px, 2.5vw, 16px);
  letter-spacing: 3px;
  opacity: 0.7;
}

/* COUNTDOWN */
.countdown {
  margin-top: 40px;
  font-size: clamp(14px, 3vw, 18px);
  letter-spacing: 4px;
  opacity: 0.7;
}

/* TAP */
.tap {
  position: absolute;
  top: -20px;
  right: 20px;

  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;

  cursor: pointer;
  animation: bounce 1.6s infinite;
}

.tap span {
  font-weight: 700;
}

body.active .tap {
  opacity: 0;
  pointer-events: none;
}

/* ANIMAÇÃO MELHORADA */
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* INITIAL */
.initial {
  transition: opacity 0.8s ease;
}

body.active .initial {
  opacity: 0;
}

/* REVEAL (FIX CENTRADO) */
.reveal {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  margin-top: 60px;

  font-size: clamp(16px, 4vw, 22px);
  letter-spacing: 3px;

  opacity: 0;
  transition: opacity 1s ease;
}

body.active .reveal {
  opacity: 1;
}

/* BOTÃO */
.rsvp {
  margin-top: 50px;
  display: inline-block;
  text-decoration: none;

  border: 1px solid rgba(0,0,0,0.4);
  padding: 12px 28px;
  font-size: 12px;
  letter-spacing: 3px;

  background: transparent;
  color: #111;

  transition: all 0.3s ease;

  opacity: 0;
}

body.active .rsvp {
  opacity: 1;
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

.rsvp:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -10;
  display: none;
}

body.active .bg-video {
  display: block;
  opacity: 0.25;
  filter: blur(6px) grayscale(100%);
}

</style>
</head>

<body>

<div class="poster">

  <!-- TAP -->
  <div class="tap">🖤 <span>dress code</span></div>

  <!-- INITIAL -->
  <div class="initial">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>
  </div>

  <!-- REVEAL -->
  <div class="reveal">
    <div>all black</div>
    <div>no exceptions</div>
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown"></div>

  <!-- BOTÃO -->
  <a href="https://forms.gle/YFfshJma97fQJsei7" target="_blank" class="rsvp">
    confirm
  </a>

</div>

<!-- VIDEO -->
<video class="bg-video" muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("music");
const video = document.querySelector(".bg-video");

function activateExperience() {
  document.body.classList.add("active");
  video.play().catch(() => {});
  audio.play().catch(() => {});
}

document.body.addEventListener("click", activateExperience, { once: true });

window.addEventListener("beforeunload", () => audio.pause());

document.addEventListener("visibilitychange", () => {
  if (document.hidden) audio.pause();
});

document.querySelector(".rsvp").addEventListener("click", () => {
  audio.pause();
});

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance/(1000*60*60)) % 24);
  const m = Math.floor((distance/(1000*60)) % 60);
  const s = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    d + "d " +
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
