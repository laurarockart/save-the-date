<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: #111;
  transition: all 1s ease;

  /* FUNDO COM LUZ + GRAIN */
  background:
  radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 55%),
  radial-gradient(circle at 75% 70%, rgba(255,255,255,0.6), transparent 60%),
  radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4), transparent 70%),
  
  /* luz tipo flash */
  radial-gradient(circle at 40% 60%, rgba(255,255,255,0.2), transparent 80%),

  /* grain mais visível */
  repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.03),
    rgba(0,0,0,0.03) 1px,
    transparent 1px,
    transparent 2px
  ),

  #efefef;
}

body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

.poster {
  position: relative;
  width: 90%;
  max-width: 600px;
  text-align: center;
  z-index: 2;
}

/* INITIAL */
.initial {
  transition: opacity 0.8s ease;
}

body.active .initial {
  opacity: 0;
}

/* TEXT */
.names {
  font-size: 6vw;
  margin-bottom: 4vh;
  letter-spacing: 6px;
  opacity: 0.6;
}

.date {
  font-size: 12vw;
}

.info {
  margin-top: 2vh;
  font-size: 3vw;
  letter-spacing: 3px;
  opacity: 0.7;
}

/* COUNTDOWN */
.countdown {
  margin-top: 5vh;
  font-size: 3vw;
  opacity: 0.4;
  letter-spacing: 3px;
}

/* TAP */
.tap {
  position: absolute;
  top: -80px;
  right: 10%;

  font-size: 2.6vw;
  letter-spacing: 3px;
  font-weight: 600;
  text-transform: uppercase;

  cursor: pointer;

  animation: pulse 2.2s infinite;

  /* glow base */
  text-shadow:
    0 0 6px rgba(0,0,0,0.15),
    0 0 12px rgba(0,0,0,0.08);

  transition: all 0.3s ease;
}

/* palavra principal */
.tap span {
  font-weight: 700;
  letter-spacing: 4px;
}

.tap::before {
  content: "tap";
  position: absolute;
  top: -14px;
  right: 0;
  font-size: 10px;
  opacity: 0.4;
  letter-spacing: 2px;
}
  
/* GLITCH subtil */
.tap::after {
  content: "🖤 dress code";
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0;

  color: #000;
  transform: translate(0,0);
}

/* glitch trigger */
.tap:hover::after {
  animation: glitch 0.3s linear;
}

/* modo dark */
body.active .tap {
  text-shadow:
    0 0 8px rgba(255,255,255,0.25),
    0 0 18px rgba(255,255,255,0.1);
}

body.active .tap::after {
  color: #fff;
}

/* PULSE (em vez de bounce) */
@keyframes pulse {
  0% { transform: translateY(0); opacity: 1; }
  50% { transform: translateY(-6px); opacity: 0.85; }
  100% { transform: translateY(0); opacity: 1; }
}

/* GLITCH */
@keyframes glitch {
  0% {
    transform: translate(0,0);
    opacity: 0.2;
  }
  20% {
    transform: translate(-2px, 1px);
  }
  40% {
    transform: translate(2px, -1px);
  }
  60% {
    transform: translate(-1px, 2px);
  }
  80% {
    transform: translate(1px, -2px);
  }
  100% {
    transform: translate(0,0);
    opacity: 0;
  }
}

/* HOVER feedback */
.tap:hover {
  transform: scale(1.05);
}
}

/* REVEAL */
.reveal {
  position: absolute;
  width: 100%;
  top: 45%;
  transform: translateY(-50%);
  font-size: 4vw;
  letter-spacing: 3px;
  opacity: 0;
  transition: opacity 1.2s ease;
}

body.active .reveal {
  opacity: 1;
}

/* BOTÃO (CORRIGIDO) */
.rsvp {
  margin-top: 5vh;
  display: inline-block;
  text-decoration: none;

  border: 1px solid rgba(0,0,0,0.5);
  color: #111;
  background: transparent;

  font-size: 12px;
  letter-spacing: 3px;
  padding: 12px 28px;

  opacity: 1;
  transition: all 0.4s ease;

  /* destaque subtil */
  box-shadow: 0 0 0 rgba(0,0,0,0);
}

/* dark mode */
body.active .rsvp {
  border: 1px solid rgba(255,255,255,0.5);
  color: #f5f5f5;
}

/* hover com glow */
.rsvp:hover {
  transform: translateY(-2px);

  box-shadow:
    0 0 10px rgba(0,0,0,0.15),
    0 0 20px rgba(0,0,0,0.05);
}

body.active .rsvp:hover {
  box-shadow:
    0 0 12px rgba(255,255,255,0.25),
    0 0 25px rgba(255,255,255,0.1);
}
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: opacity 1.5s ease;
}

body.active .bg-video {
  opacity: 0.25;
  filter: blur(6px) contrast(120%) grayscale(100%);
}

/* DESKTOP */
@media (min-width: 600px) {
  .names { font-size: 36px; }
  .date { font-size: 70px; }
  .info, .countdown { font-size: 12px; }
  .tap { font-size: 12px; }
}
</style>
</head>

<body>

<div class="poster">

  <!-- TAP -->
<div class="tap">
  🖤 <span>dress code</span>
</div>

  <!-- INITIAL -->
  <div class="initial">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>
  </div>

  <!-- REVEAL -->
  <div class="reveal">
    all black<br>no exceptions
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown"></div>

  <!-- BOTÃO -->
  <a href="https://forms.gle/YFfshJma97fQJsei7" target="_blank" class="rsvp">
    confirm
  </a>

</div>

<!-- VIDEO -->
<video class="bg-video" muted loop playsinline preload="auto">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function activateExperience() {
  document.body.classList.add("active");

  const video = document.querySelector(".bg-video");
  const audio = document.getElementById("music");

  video.play().catch(() => {});
  audio.play().catch(() => {});
}

document.body.addEventListener("click", activateExperience, { once: true });

  const audio = document.getElementById("music");

/* parar ao sair da página */
window.addEventListener("beforeunload", () => {
  audio.pause();
  audio.currentTime = 0;
});

/* parar quando muda de tab */
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    audio.pause();
  }
});

/* parar ao clicar no botão */
document.querySelector(".rsvp").addEventListener("click", () => {
  audio.pause();
});

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance/(1000*60*60)) % 24);
  const minutes = Math.floor((distance/(1000*60)) % 60);
  const seconds = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " +
    String(hours).padStart(2,'0') + ":" +
    String(minutes).padStart(2,'0') + ":" +
    String(seconds).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
