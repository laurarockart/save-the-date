<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #f2f2f2;
  color: #111;
  transition: all 1s ease;
}

body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

.poster {
  position: relative;
  width: 90%;
  max-width: 600px;
  text-align: center;
  z-index: 2;
}

/* TEXTO INICIAL */
.initial {
  transition: opacity 0.8s ease;
}

body.active .initial {
  opacity: 0;
}

/* TEXTO BASE */
.names {
  font-size: 6vw;
  margin-bottom: 4vh;
  letter-spacing: 6px;
  opacity: 0.6;
}

.date {
  font-size: 12vw;
}

.info {
  margin-top: 2vh;
  font-size: 3vw;
  letter-spacing: 3px;
  opacity: 0.7;
}

/* COUNTDOWN (SEMPRE VISÍVEL) */
.countdown {
  margin-top: 4vh;
  font-size: 3vw;
  opacity: 0.4;
  letter-spacing: 3px;
}

/* DRESS CODE (DESTAQUE) */
.tap {
  position: absolute;
  top: -30px;
  right: 10%;
  font-size: 2.8vw;
  letter-spacing: 2px;
  font-weight: 500;
  animation: bounce 1s infinite alternate;
}

/* destaque na palavra */
.tap span {
  color: #000;
  font-weight: 600;
}

body.active .tap span {
  color: #fff;
}

/* animação */
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

/* REVEAL */
.reveal {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  font-size: 4vw; /* MAIS PEQUENO */
  letter-spacing: 3px;
  opacity: 0;
  transition: opacity 1.2s ease;
}

body.active .reveal {
  opacity: 1;
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: opacity 1.5s ease;
}

body.active .bg-video {
  opacity: 0.25;
  filter: blur(6px) contrast(120%) grayscale(100%);
}

/* DESKTOP */
@media (min-width: 600px) {
  .names { font-size: 36px; }
  .date { font-size: 70px; }
  .info, .countdown { font-size: 12px; }
  .tap { font-size: 12px; }
}
</style>
</head>

<body>

<div class="poster">

  <!-- TAP (DESTAQUE VISUAL) -->
  <div class="tap">
    👉 <span>dress code</span>
  </div>

  <!-- TEXTO INICIAL -->
  <div class="initial">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>
  </div>

  <!-- REVEAL -->
  <div class="reveal">
    all black<br>no exceptions
  </div>

  <!-- COUNTDOWN (SEMPRE) -->
  <div class="countdown" id="countdown"></div>

</div>

<!-- VIDEO (SEM SOM) -->
<video class="bg-video" muted loop playsinline preload="auto">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- MÚSICA -->
<audio id="music" loop>
  <source src="TUA-MUSICA.mp3" type="audio/mpeg">
</audio>

<script>
function activateExperience() {
  document.body.classList.add("active");

  const video = document.querySelector(".bg-video");
  const audio = document.getElementById("music");

  video.play().catch(() => {});
  audio.play().catch(() => {});
}

document.body.addEventListener("click", activateExperience, { once: true });

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const days = Math.floor(distance / (1000*60*60*24));
  const hours = Math.floor((distance/(1000*60*60)) % 24);
  const minutes = Math.floor((distance/(1000*60)) % 60);
  const seconds = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    days + "d " +
    String(hours).padStart(2,'0') + ":" +
    String(minutes).padStart(2,'0') + ":" +
    String(seconds).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
