<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03.09.2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      color: #f5f5f5;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0a0a0a;
    }

    .poster {
      position: relative;
      width: 90%;
      max-width: 600px;
      text-align: center;
      padding: 0 5%; /* garante margem nos lados */
      box-sizing: border-box;
    }

    /* Responsivo com texto escalável */
    .names {
      font-size: 4vw; /* escala conforme largura da tela */
      margin-bottom: 4vh;
      letter-spacing: 6px;
      opacity: 0.6;
      text-transform: lowercase;
    }

    .date {
      font-size: 12vw; /* escala automaticamente */
      font-weight: 300;
      line-height: 1.1;
      white-space: normal;
      word-break: break-word;
    }

    .info {
      margin-top: 2vh;
      font-size: 3vw; /* escala conforme tela */
      letter-spacing: 4px;
      text-transform: lowercase;
      opacity: 0.7;
      white-space: normal;
    }

    .countdown {
      margin-top: 4vh;
      font-size: 3vw;
      opacity: 0.35;
      letter-spacing: 3px;
    }

    /* Vídeo de fundo */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.35; /* mais visível */
      filter: blur(5px) contrast(120%) grayscale(100%);
    }

    /* Ajustes para desktop */
    @media (min-width: 600px) {
      .names { font-size: 36px; margin-bottom: 60px; }
      .date { font-size: 70px; }
      .info { font-size: 12px; }
      .countdown { font-size: 12px; }
    }
  </style>
</head>

<body>
  <div class="poster">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>
    <div class="countdown" id="countdown"></div>
  </div>

  <!-- Vídeo de fundo -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- Música de fundo -->
  <audio id="bg-music" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Toca música quando o utilizador clicar na página
    document.body.addEventListener('click', () => {
      const audio = document.getElementById('bg-music');
      audio.play();
    }, {once:true});
  </script>

  <script>
    // Countdown
    const eventDate = new Date("2026-09-03T22:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = eventDate - now;

      if (distance < 0) {
        document.getElementById("countdown").innerHTML = "it’s happening";
        return;
      }

      const days = Math.floor(distance / (1000*60*60*24));
      const hours = Math.floor((distance/(1000*60*60)) % 24);
      const minutes = Math.floor((distance/(1000*60)) % 60);
      const seconds = Math.floor((distance/1000) % 60);

      document.getElementById("countdown").innerHTML =
        days + "d " +
        String(hours).padStart(2,'0') + ":" +
        String(minutes).padStart(2,'0') + ":" +
        String(seconds).padStart(2,'0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
