<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #f2f2f2;
  color: #111;
  transition: all 1s ease;
}

/* ATIVO */
body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

/* CONTAINER */
.poster {
  position: relative;
  width: 90%;
  max-width: 600px;
  text-align: center;
  z-index: 2;
}

/* TEXTO INICIAL */
.initial {
  transition: opacity 0.8s ease;
}

body.active .initial {
  opacity: 0;
  pointer-events: none;
}

/* TEXTO */
.names {
  font-size: 6vw;
  margin-bottom: 4vh;
  letter-spacing: 6px;
  opacity: 0.6;
}

.date {
  font-size: 12vw;
}

.info {
  margin-top: 2vh;
  font-size: 3vw;
  letter-spacing: 3px;
  opacity: 0.7;
}

/* TEASE */
.tease {
  margin-top: 5vh;
  font-size: 3vw;
  letter-spacing: 3px;
}

/* REVEAL */
.reveal {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  font-size: 6vw;
  letter-spacing: 4px;
  opacity: 0;
  transition: opacity 1.2s ease;
}

body.active .reveal {
  opacity: 1;
}

/* POINTER */
.pointer {
  position: absolute;
  top: -20px;
  right: 30%;
  animation: bounce 1s infinite alternate;
}

.pointer img {
  width: 36px;
}

/* fallback se imagem falhar */
.pointer::after {
  content: "↑";
  font-size: 24px;
  display: none;
}

.pointer img:invalid + .pointer::after {
  display: block;
}

/* animação */
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-8px); }
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
  opacity: 0;
  transition: opacity 1.5s ease;
}

body.active .bg-video {
  opacity: 0.25;
  filter: blur(6px) contrast(120%) grayscale(100%);
}

/* DESKTOP */
@media (min-width: 600px) {
  .names { font-size: 36px; }
  .date { font-size: 70px; }
  .info, .tease { font-size: 12px; }
}
</style>
</head>

<body>

<div class="poster">

  <!-- TEXTO INICIAL -->
  <div class="initial">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>

    <div class="tease">tap to reveal dress code</div>

    <!-- POINTER -->
    <div class="pointer">
      <img src="pointer.png" alt="">
    </div>
  </div>

  <!-- REVEAL -->
  <div class="reveal">
    all black<br>no exceptions
  </div>

</div>

<!-- VIDEO (SEM SOM) -->
<video class="bg-video" muted loop playsinline preload="auto">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- ÁUDIO (METE AQUI A TUA MÚSICA) -->
<audio id="music" loop>
  <source src="TUA-MUSICA.mp3" type="audio/mpeg">
</audio>

<script>
function activateExperience() {
  document.body.classList.add("active");

  const video = document.querySelector(".bg-video");
  const audio = document.getElementById("music");

  video.muted = true;
  video.play().catch(() => {});

  audio.play().catch(() => {});
}

document.body.addEventListener("click", activateExperience, { once: true });
</script>

</body>
</html>
