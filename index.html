<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111;
  transition: all 0.8s ease;

  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.6), transparent 60%),
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03),
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 2px
    ),
    #efefef;
}

body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

.poster {
  width: 100%;
  max-width: 600px;
  padding: 40px 20px;
  text-align: center;
  position: relative;
}

/* HEADER */
.names {
  font-size: clamp(20px, 4vw, 32px);
  margin-bottom: 30px;
  letter-spacing: 6px;
  opacity: 0.6;
}

/* INITIAL */
.initial {
  transition: opacity 0.6s ease;
}

body.active .initial {
  opacity: 0;
}

/* TEXT */
.date {
  font-size: clamp(42px, 10vw, 80px);
}

.info {
  margin-top: 10px;
  font-size: clamp(12px, 2.5vw, 16px);
  letter-spacing: 3px;
  opacity: 0.7;
}

/* REVEAL */
.reveal {
  margin-top: 30px;

  font-size: clamp(12px, 2.5vw, 16px); /* igual ao .info */
  letter-spacing: 3px;
  opacity: 0.7;

  opacity: 0;
  transform: translateY(10px);
  transition: all 0.8s ease;
}

body.active .reveal {
  opacity: 1;
  transform: translateY(-10px);
}

/* BACK */
.back {
  position: absolute;
  top: -20px;
  left: 20px;
  font-size: 14px;
  cursor: pointer;
  opacity: 0;
  transition: 0.3s;
}

body.active .back {
  opacity: 0.6;
}

/* COUNTDOWN */
.countdown {
  margin-top: 40px;
  font-size: clamp(14px, 3vw, 18px);
  letter-spacing: 4px;
  opacity: 0.7;
}

/* BOTÃO (ÚNICO DINÂMICO) */
.cta {
  margin-top: 50px;
  display: inline-block;
  text-decoration: none;

  border: 1px solid rgba(0,0,0,0.4);
  padding: 12px 28px;
  font-size: 12px;
  letter-spacing: 3px;

  background: transparent;
  color: #111;

  transition: all 0.3s ease;
}

body.active .cta {
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

.cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -10;
  display: none;
}

body.active .bg-video {
  display: block;
  opacity: 0.25;
  filter: blur(6px) grayscale(100%);
}

</style>
</head>

<body>

<div class="poster">

  <div class="names">l + d</div>

  <div class="back" onclick="goBack()">←</div>

  <!-- INITIAL -->
  <div class="initial">
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>
  </div>

  <!-- REVEAL -->
  <div class="reveal">
    <div class="date">03.09.2026</div>
    <div style="margin-top:10px;">
      Dress code: all black 🖤 - no exceptions
    </div>
  </div>

  <div class="countdown" id="countdown"></div>

  <!-- BOTÃO DINÂMICO -->
  <a href="#" class="cta" id="ctaButton">+ info</a>

</div>

<video class="bg-video" muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("music");
const video = document.querySelector(".bg-video");
const cta = document.getElementById("ctaButton");

function activateExperience() {
  document.body.classList.add("active");

  video.play().catch(() => {});
  audio.play().catch(() => {});

  /* muda botão */
  cta.textContent = "confirm";
  cta.href = "https://forms.gle/YFfshJma97fQJsei7";
  cta.target = "_blank";
}

function goBack() {
  document.body.classList.remove("active");

  /* volta botão */
  cta.textContent = "+ info";
  cta.href = "#";
  cta.target = "";
}

/* comportamento botão */
cta.addEventListener("click", function(e) {
  if (!document.body.classList.contains("active")) {
    e.preventDefault();
    activateExperience();
  }
});

/* parar música */
window.addEventListener("beforeunload", () => audio.pause());

document.addEventListener("visibilitychange", () => {
  if (document.hidden) audio.pause();
});

cta.addEventListener("click", () => {
  if (document.body.classList.contains("active")) {
    audio.pause();
  }
});

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance/(1000*60*60)) % 24);
  const m = Math.floor((distance/(1000*60)) % 60);
  const s = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    d + "d " +
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
