<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111;
  transition: all 0.6s ease;

  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.6), transparent 60%),
    #efefef;
}

body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

/* CONTAINER */
.poster {
  width: 100%;
  max-width: 600px;
  padding: 60px 20px 100px;
  text-align: center;
  position: relative;
}

/* ❤️ HEART */
.heart {
  position: absolute;
  top: 5px;
  left: 50%;
  
  /* 👇 AQUI ESTÁ A CORREÇÃO REAL */
  transform: translateX(calc(-50% - 4px));

  font-size: 14px;
  pointer-events: none;
}

/* NAMES */
.names {
  margin-top: 35px;
  font-size: clamp(20px, 4vw, 32px);
  letter-spacing: 6px;
  opacity: 0.6;
}

/* CONTENT */
.content {
  position: relative;
  height: 140px;
  margin-top: 20px;
}

.date {
  position: absolute;
  width: 100%;
  top: 0;
  left: 0;
  font-size: clamp(42px, 10vw, 80px);
}

.info, .reveal {
  position: absolute;
  width: 100%;
  top: 80px;
  left: 0;

  font-size: clamp(12px, 2.5vw, 16px);
  letter-spacing: 3px;
  opacity: 0.7;
  transition: opacity 0.5s ease;
}

.reveal { opacity: 0; }

body.active .info { opacity: 0; }
body.active .reveal { opacity: 1; }

/* COUNTDOWN */
.countdown {
  margin-top: 50px;
  font-size: clamp(16px, 3vw, 20px);
  letter-spacing: 4px;
}

/* CTA */
.cta {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);

  text-decoration: none;
  border: 1px solid rgba(0,0,0,0.4);
  padding: 14px 34px;
  font-size: 12px;
  letter-spacing: 3px;

  background: transparent;
  color: #111;
  transition: all 0.3s ease;
}

body.active .cta {
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

.cta:hover {
  transform: translateX(-50%) translateY(-2px);
  box-shadow: 0 0 12px rgba(255,255,255,0.2);
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -10;
  display: none;
}

body.active .bg-video {
  display: block;
  opacity: 0.25;
  filter: blur(6px) grayscale(100%);
}

</style>
</head>

<body>

<div class="poster">

  <div class="heart" id="heart">🖤</div>

  <div class="names">l + d</div>

  <div class="content">
    <div class="date">03.09.2026</div>

    <div class="info">
      22:00 · porto — you’ll find out
    </div>

    <div class="reveal">
      dress code: all black 🖤 no exceptions <br>
      <strong>adults only!!!</strong>
    </div>
  </div>

  <div class="countdown" id="countdown"></div>

</div>

<a href="#" class="cta" id="ctaButton">enter</a>

<video class="bg-video" muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("music");
const video = document.querySelector(".bg-video");
const cta = document.getElementById("ctaButton");
const heart = document.getElementById("heart");

function activateExperience() {
  document.body.classList.add("active");

  history.pushState({page: 2}, "", "#details");

  video.play().catch(() => {});
  audio.currentTime = 0;
  audio.play().catch(() => {});

  heart.textContent = "🤍";

  cta.textContent = "confirm";
  cta.href = "https://forms.gle/YFfshJma97fQJsei7";
  cta.target = "_blank";
}

function deactivateExperience() {
  document.body.classList.remove("active");

  audio.pause();
  audio.currentTime = 0;

  heart.textContent = "🖤";

  cta.textContent = "enter";
  cta.href = "#";
  cta.target = "";
}

cta.addEventListener("click", function(e) {
  if (!document.body.classList.contains("active")) {
    e.preventDefault();
    activateExperience();
  } else {
    audio.pause();
  }
});

window.addEventListener("popstate", function() {
  if (document.body.classList.contains("active")) {
    deactivateExperience();
  }
});

window.addEventListener("beforeunload", () => audio.pause());

document.addEventListener("visibilitychange", () => {
  if (document.hidden) audio.pause();
});

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance/(1000*60*60)) % 24);
  const m = Math.floor((distance/(1000*60)) % 60);
  const s = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    d + "d " +
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
