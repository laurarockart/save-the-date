<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>

html, body {
  margin: 0;
  padding: 0;
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111;
  transition: background 0.5s ease;

  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.6), transparent 60%),
    #efefef;
}

body.active {
  background: #050505;
  color: #f5f5f5;
}

/* HEART */
.heart {
  font-size: 14px;
  margin-bottom: 10px;
  transition: color 0.5s ease;
}

body.active .heart {
  color: white;
}

/* NAMES */
.names {
  font-size: clamp(20px, 4vw, 32px);
  letter-spacing: 6px;
  opacity: 0.6;
  margin-bottom: 40px;
}

/* CONTENT FIXO */
.content {
  position: relative;
  height: 140px;
}

/* GLITCH RGB */
.glitch {
  position: relative;
  display: inline-block;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
  opacity: 0.6;
}

.glitch::before {
  color: red;
  transform: translate(-2px, 0);
}

.glitch::after {
  color: blue;
  transform: translate(2px, 0);
}

.glitch-active::before {
  animation: glitchR 0.3s infinite;
}

.glitch-active::after {
  animation: glitchB 0.3s infinite;
}

@keyframes glitchR {
  0% { transform: translate(-2px, 0); }
  50% { transform: translate(-5px, 2px); }
  100% { transform: translate(-2px, 0); }
}

@keyframes glitchB {
  0% { transform: translate(2px, 0); }
  50% { transform: translate(5px, -2px); }
  100% { transform: translate(2px, 0); }
}

/* DATE */
.date {
  position: absolute;
  width: 100%;
  top: 0;
  font-size: clamp(42px, 10vw, 80px);
}

/* INFO */
.info, .reveal {
  position: absolute;
  width: 100%;
  top: 80px;

  font-size: clamp(12px, 2.5vw, 16px);
  letter-spacing: 3px;
  opacity: 0.7;
  transition: opacity 0.4s ease;
}

.reveal { opacity: 0; }

body.active .info { opacity: 0; }
body.active .reveal { opacity: 1; }

/* COUNTDOWN HEARTBEAT */
.countdown {
  margin-top: 60px;
  font-size: clamp(16px, 3vw, 22px);
  letter-spacing: 4px;

  padding: 16px 26px;
  display: inline-block;

  background: rgba(0,0,0,0.1);
  border-radius: 40px;

  box-shadow: 0 0 20px rgba(0,0,0,0.15);

  animation: pulse 1.8s infinite;
}

body.active .countdown {
  background: rgba(255,255,255,0.08);
  box-shadow: 0 0 25px rgba(255,255,255,0.15);
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}

/* BOTÃO FIXO EM BAIXO */
.cta {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);

  text-decoration: none;
  border: 1px solid rgba(0,0,0,0.4);
  padding: 12px 28px;
  font-size: 12px;
  letter-spacing: 3px;

  background: transparent;
  color: #111;
  transition: all 0.3s ease;
}

body.active .cta {
  border-color: rgba(255,255,255,0.5);
  color: #fff;
}

.cta:hover {
  transform: translateX(-50%) translateY(-3px);
  box-shadow: 0 0 14px rgba(255,255,255,0.25);
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -10;
  display: none;
}

body.active .bg-video {
  display: block;
  opacity: 0.25;
  filter: blur(6px) grayscale(100%);
}

</style>
</head>

<body>

<div class="poster">

  <div class="heart">🖤</div>
  <div class="names">l + d</div>

  <div class="content">
    <div class="date glitch" id="date" data-text="03.09.2026">03.09.2026</div>

    <div class="info">
      22:00 · porto — you’ll find out
    </div>

    <div class="reveal">
      Dress code: all black 🖤 - no exceptions
    </div>
  </div>

  <div class="countdown" id="countdown"></div>

</div>

<a href="#" class="cta" id="ctaButton">enter</a>

<video class="bg-video" muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("music");
const video = document.querySelector(".bg-video");
const cta = document.getElementById("ctaButton");
const date = document.getElementById("date");

function activateExperience() {

  date.classList.add("glitch-active");

  setTimeout(() => {
    document.body.classList.add("active");

    video.play().catch(() => {});
    audio.currentTime = 0;
    audio.play().catch(() => {});

    cta.textContent = "confirm";
    cta.href = "https://forms.gle/YFfshJma97fQJsei7";
    cta.target = "_blank";

    setTimeout(() => {
      date.classList.remove("glitch-active");
    }, 600);

  }, 200);
}

cta.addEventListener("click", function(e) {
  if (!document.body.classList.contains("active")) {
    e.preventDefault();
    activateExperience();
  } else {
    audio.pause();
  }
});

/* parar música */
window.addEventListener("beforeunload", () => audio.pause());

document.addEventListener("visibilitychange", () => {
  if (document.hidden) audio.pause();
});

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance/(1000*60*60)) % 24);
  const m = Math.floor((distance/(1000*60)) % 60);
  const s = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    d + "d " +
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>

</body>
</html>
