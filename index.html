<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
  }
  /* Vídeo de fundo */
  video {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
    opacity: 0.25;
    filter: blur(8px) contrast(120%) grayscale(100%);
  }
</style>
</head>
<body>

<video autoplay muted loop playsinline preload="auto" id="bg-video">
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  // Forçar autoplay se travar no Safari
  const video = document.getElementById('bg-video');
  video.addEventListener('canplay', () => {
    video.play().catch(()=>{ 
      console.log('Tentativa de autoplay falhou, mas o vídeo tentará novamente automaticamente.');
    });
  });
</script>

</body>
</html>
