<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03.09.2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">

<style>

/* RESET IMPORTANTE */
html, body {
  margin: 0;
  padding: 0;
  max-width: 100%;
  overflow-x: hidden;
}

/* BASE */
body {
  height: 100vh;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111;
  transition: all 1s ease;

  /* FUNDO TEXTURADO */
  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,0.9), transparent 55%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.6), transparent 60%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4), transparent 70%),
    radial-gradient(circle at 40% 60%, rgba(255,255,255,0.2), transparent 80%),
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.03),
      rgba(0,0,0,0.03) 1px,
      transparent 1px,
      transparent 2px
    ),
    #efefef;
}

body.active {
  background: #0a0a0a;
  color: #f5f5f5;
}

/* LAYOUT */
.poster {
  position: relative;
  width: 100%;
  max-width: 600px;
  padding: 0 20px;
  box-sizing: border-box;
  text-align: center;
}

/* INITIAL */
.initial {
  transition: opacity 0.8s ease;
}

body.active .initial {
  opacity: 0;
}

/* TEXT */
.names {
  font-size: 6vw;
  margin-bottom: 4vh;
  letter-spacing: 6px;
  opacity: 0.6;
}

.date {
  font-size: 12vw;
}

.info {
  margin-top: 2vh;
  font-size: 3vw;
  letter-spacing: 3px;
  opacity: 0.7;
}

/* COUNTDOWN */
.countdown {
  margin-top: 6vh;
  font-size: 4vw;
  letter-spacing: 4px;
  opacity: 0.7;
  text-shadow: 0 0 8px rgba(0,0,0,0.08);
}

body.active .countdown {
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* TAP (corrigido mobile) */
.tap {
  position: absolute;
  top: -50px;
  right: 20px;

  font-size: 12px;
  max-width: 140px;
  text-align: right;
  white-space: nowrap;

  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;

  cursor: pointer;
  animation: pulse 2s infinite;

  text-shadow:
    0 0 6px rgba(0,0,0,0.15),
    0 0 12px rgba(0,0,0,0.08);
}

.tap span {
  font-weight: 700;
  letter-spacing: 3px;
}

/* esconder no estado 2 */
body.active .tap {
  opacity: 0;
  pointer-events: none;
}

/* animação */
@keyframes pulse {
  0% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0); }
}

/* REVEAL */
.reveal {
  position: absolute;
  width: 100%;
  top: 45%;
  transform: translateY(-50%);
  font-size: 4vw;
  letter-spacing: 3px;

  opacity: 0;
  pointer-events: none;
  transition: opacity 1.2s ease;
}

body.active .reveal {
  opacity: 1;
  pointer-events: auto;
}

/* BOTÃO */
.rsvp {
  margin-top: 6vh;
  display: inline-block;
  text-decoration: none;

  border: 1px solid rgba(0,0,0,0.5);
  color: #111;
  background: transparent;

  font-size: 12px;
  letter-spacing: 3px;
  padding: 12px 28px;

  opacity: 0;
  pointer-events: none;
  transition: all 0.4s ease;
}

body.active .rsvp {
  opacity: 1;
  pointer-events: auto;
  border: 1px solid rgba(255,255,255,0.5);
  color: #f5f5f5;
}

.rsvp:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

/* VIDEO */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -10;
  display: none;
}

body.active .bg-video {
  display: block;
  opacity: 0.25;
  filter: blur(6px) grayscale(100%);
}

/* MOBILE EXTRA */
@media (max-width: 480px) {
  .names { font-size: 28px; }
  .date { font-size: 48px; }
  .info { font-size: 12px; }
  .countdown { font-size: 16px; }

  .tap {
    top: -40px;
    right: 10px;
    font-size: 11px;
  }
}

</style>
</head>

<body>

<div class="poster">

  <!-- TAP -->
  <div class="tap">
    🖤 <span>dress code</span>
  </div>

  <!-- INITIAL -->
  <div class="initial">
    <div class="names">l + d</div>
    <div class="date">03.09.2026</div>
    <div class="info">22:00 · porto — you’ll find out</div>
  </div>

  <!-- REVEAL -->
  <div class="reveal">
    all black<br>no exceptions
  </div>

  <!-- COUNTDOWN -->
  <div class="countdown" id="countdown"></div>

  <!-- BOTÃO -->
  <a href="https://forms.gle/YFfshJma97fQJsei7" target="_blank" class="rsvp">
    confirm
  </a>

</div>

<!-- VIDEO -->
<video class="bg-video" muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("music");
const video = document.querySelector(".bg-video");

function activateExperience() {
  document.body.classList.add("active");

  video.play().catch(() => {});
  audio.play().catch(() => {});
}

/* TAP GLOBAL */
document.body.addEventListener("click", activateExperience, { once: true });

/* parar música */
window.addEventListener("beforeunload", () => audio.pause());

document.addEventListener("visibilitychange", () => {
  if (document.hidden) audio.pause();
});

document.querySelector(".rsvp").addEventListener("click", () => {
  audio.pause();
});

/* COUNTDOWN */
const eventDate = new Date("2026-09-03T22:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const distance = eventDate - now;

  if (distance < 0) {
    document.getElementById("countdown").innerHTML = "it’s happening";
    return;
  }

  const d = Math.floor(distance / (1000*60*60*24));
  const h = Math.floor((distance/(1000*60*60)) % 24);
  const m = Math.floor((distance/(1000*60)) % 60);
  const s = Math.floor((distance/1000) % 60);

  document.getElementById("countdown").innerHTML =
    d + "d " +
    String(h).padStart(2,'0') + ":" +
    String(m).padStart(2,'0') + ":" +
    String(s).padStart(2,'0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
